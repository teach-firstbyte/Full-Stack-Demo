<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Health Habits</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="header">
    <img class="logo" src="images/ViTaL_Logo.svg" alt="ViTaL Logo">
    <div>
      <h1>Health Habits</h1>
      <p class="subtitle">Track your daily wellness routine</p>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-today" onclick="switchTab('today')">Today</button>
    <button class="tab" id="tab-habits" onclick="switchTab('habits')">My Habits</button>
  </div>

  <div class="card" id="view-today">
    <div class="today-header">
      <div>
        <h2 id="today-date-label"></h2>
        <p id="today-count" class="subtitle"></p>
      </div>
      <div class="pct-block">
        <span class="pct-num" id="today-pct">0%</span>
        <span class="subtitle">complete</span>
      </div>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div id="today-list"></div>
  </div>
  <div class="card hidden" id="view-habits">
    <div class="add-form">
      <label class="form-label">Habit Name</label>
      <input
        class="form-input"
        id="habit-input"
        type="text"
        placeholder="e.g., Drink 8 glasses of water"
      />
      <label class="form-label">Color</label>
      <div class="colors-row" id="colors-row"></div>
      <div class="form-actions">
        <button class="btn-primary" onclick="addHabit()">Add Habit</button>
        <button class="btn-secondary" onclick="cancelAdd()">Cancel</button>
      </div>
    </div>
    <h3>Your Habits</h3>
    <div id="habits-list"></div>
  </div>
  <script src="app.js"></script>
</body>
</html>
